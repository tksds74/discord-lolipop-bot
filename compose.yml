services:
  discord-bot:
    build: .
    container_name: discord-lolipop-bot
    restart: unless-stopped
    volumes:
      - ./permissions.json:/app/permissions.json:ro
      - ${SSH_KEY_PATH}:/app/ssh_key:ro
      - ${SSH_KNOWN_HOSTS}:/app/known_hosts:ro
    environment:
      - TZ=Asia/Tokyo
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - SSH_HOST=${SSH_HOST}
      - SSH_PORT=${SSH_PORT}
      - SSH_USER=${SSH_USER}
      - SSH_KEY_PATH=/app/ssh_key
      - SSH_KEY_PASSPHRASE=${SSH_KEY_PASSPHRASE}
      - SSH_KNOWN_HOSTS=/app/known_hosts
      - PERMISSION_CONFIG_PATH=/app/permissions.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
